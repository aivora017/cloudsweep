{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cloudsweep.fullname" . }}-scanner-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cloudsweep.name" . }}
      app.kubernetes.io/component: scanner
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
    # AWS API endpoints (ec2, rds, cloudwatch, ce, sts, s3)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Prometheus Pushgateway (metrics push after each scan)
    - to:
        - podSelector:
            matchLabels:
              app: pushgateway
      ports:
        - protocol: TCP
          port: 9091
{{- end }}
