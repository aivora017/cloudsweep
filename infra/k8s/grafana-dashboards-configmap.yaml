apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudsweep-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  waste-overview.json: |
    {
      "title": "CloudSweep - Waste Overview",
      "uid": "cloudsweep-waste-overview",
      "tags": ["cloudsweep"],
      "timezone": "Asia/Kolkata",
      "refresh": "1h",
      "time": { "from": "now-12w", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Total Monthly Waste (₹)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10000 },
                  { "color": "red", "value": 50000 }
                ]
              },
              "unit": "currencyINR",
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "sum(cloudsweep_waste_total_inr)",
              "legendFormat": "Total Waste ₹"
            }
          ]
        },
        {
          "id": 2,
          "title": "Total Findings",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(cloudsweep_findings_total)",
              "legendFormat": "Active Findings"
            }
          ]
        },
        {
          "id": 3,
          "title": "Last Scan",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "none", "graphMode": "none" },
          "fieldConfig": {
            "defaults": { "unit": "dateTimeFromNow" }
          },
          "targets": [
            {
              "expr": "cloudsweep_last_scan_timestamp * 1000",
              "legendFormat": "Last Scan"
            }
          ]
        },
        {
          "id": 4,
          "title": "Scan Duration",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "none", "graphMode": "none" },
          "fieldConfig": {
            "defaults": { "unit": "s" }
          },
          "targets": [
            {
              "expr": "cloudsweep_scan_duration_seconds",
              "legendFormat": "Duration"
            }
          ]
        },
        {
          "id": 5,
          "title": "12-Week Waste Trend (₹/month)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyINR",
              "color": { "mode": "palette-classic" }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "sum(cloudsweep_waste_total_inr)",
              "legendFormat": "Total Waste ₹"
            }
          ]
        },
        {
          "id": 6,
          "title": "Waste by Resource Type (₹)",
          "type": "piechart",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "currencyINR" }
          },
          "targets": [
            {
              "expr": "sum by (resource_type) (cloudsweep_waste_total_inr)",
              "legendFormat": "{{resource_type}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Waste by Region (₹)",
          "type": "piechart",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "currencyINR" }
          },
          "targets": [
            {
              "expr": "sum by (region) (cloudsweep_waste_total_inr)",
              "legendFormat": "{{region}}"
            }
          ]
        }
      ],
      "schemaVersion": 38
    }

  resource-breakdown.json: |
    {
      "title": "CloudSweep - Resource Breakdown",
      "uid": "cloudsweep-resource-breakdown",
      "tags": ["cloudsweep"],
      "timezone": "Asia/Kolkata",
      "refresh": "1h",
      "time": { "from": "now-12w", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Top Wasteful Resource Types",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 10 },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyINR",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5000 },
                  { "color": "red", "value": 20000 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sort_desc(sum by (resource_type) (cloudsweep_waste_total_inr))",
              "legendFormat": "{{resource_type}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Region Heatmap — Waste (₹)",
          "type": "table",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 10 },
          "fieldConfig": {
            "defaults": { "unit": "currencyINR" }
          },
          "options": {
            "sortBy": [{ "displayName": "Value", "desc": true }]
          },
          "targets": [
            {
              "expr": "sum by (region, resource_type) (cloudsweep_waste_total_inr)",
              "legendFormat": "{{region}} / {{resource_type}}",
              "instant": true,
              "format": "table"
            }
          ]
        },
        {
          "id": 3,
          "title": "Finding Count by Resource Type",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 8 },
          "options": {
            "orientation": "horizontal",
            "displayMode": "basic"
          },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "targets": [
            {
              "expr": "sort_desc(sum by (resource_type) (cloudsweep_findings_total))",
              "legendFormat": "{{resource_type}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Waste Trend by Resource Type",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 10, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "currencyINR",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "sum by (resource_type) (cloudsweep_waste_total_inr)",
              "legendFormat": "{{resource_type}}"
            }
          ]
        }
      ],
      "schemaVersion": 38
    }

  scan-health.json: |
    {
      "title": "CloudSweep - Scan Health",
      "uid": "cloudsweep-scan-health",
      "tags": ["cloudsweep"],
      "timezone": "Asia/Kolkata",
      "refresh": "1h",
      "time": { "from": "now-12w", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Last Scan Timestamp",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 4 },
          "options": { "colorMode": "none", "graphMode": "none" },
          "fieldConfig": {
            "defaults": { "unit": "dateTimeFromNow" }
          },
          "targets": [
            {
              "expr": "cloudsweep_last_scan_timestamp * 1000",
              "legendFormat": "Last Scan"
            }
          ]
        },
        {
          "id": 2,
          "title": "Scan Duration (seconds)",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "red", "value": 300 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "cloudsweep_scan_duration_seconds",
              "legendFormat": "Duration"
            }
          ]
        },
        {
          "id": 3,
          "title": "Hours Since Last Scan",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "unit": "h",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 168 },
                  { "color": "red", "value": 192 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "(time() - cloudsweep_last_scan_timestamp) / 3600",
              "legendFormat": "Hours since scan"
            }
          ]
        },
        {
          "id": 4,
          "title": "Scan Duration History",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "cloudsweep_scan_duration_seconds",
              "legendFormat": "Scan Duration"
            }
          ]
        },
        {
          "id": 5,
          "title": "Scan Frequency (scans per week)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "count_over_time(cloudsweep_last_scan_timestamp[7d])",
              "legendFormat": "Scans / week"
            }
          ]
        }
      ],
      "schemaVersion": 38
    }
