apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: cloudsweep
  labels:
    app: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway:v1.7.0
          ports:
            - containerPort: 9091
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: cloudsweep
  labels:
    app: pushgateway
spec:
  selector:
    app: pushgateway
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pushgateway
  namespace: cloudsweep
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: pushgateway
  namespaceSelector:
    matchNames:
      - cloudsweep
  endpoints:
    - port: metrics
      interval: 60s
      honorLabels: true
