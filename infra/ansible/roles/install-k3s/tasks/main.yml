---
# Role: install-k3s
# Installs k3s single-node cluster and fetches kubeconfig to local machine.

- name: Check if k3s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Wait for k3s to be ready
  ansible.builtin.wait_for:
    port: 6443
    host: 127.0.0.1
    timeout: 120

- name: Wait for node to reach Ready state
  ansible.builtin.shell: |
    k3s kubectl wait --for=condition=ready node --all --timeout=120s
  retries: 5
  delay: 10
  register: node_ready
  until: node_ready.rc == 0

- name: Ensure .kube directory exists for ec2-user
  ansible.builtin.file:
    path: /home/ec2-user/.kube
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0700"

- name: Copy k3s kubeconfig for ec2-user
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ec2-user/.kube/config
    remote_src: true
    owner: ec2-user
    group: ec2-user
    mode: "0600"

- name: Replace 127.0.0.1 with public IP in kubeconfig
  ansible.builtin.replace:
    path: /home/ec2-user/.kube/config
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"

- name: Fetch kubeconfig to local machine
  ansible.builtin.fetch:
    src: /home/ec2-user/.kube/config
    dest: "{{ playbook_dir }}/../../kubeconfig-{{ inventory_hostname }}.yaml"
    flat: true

- name: Print kubeconfig location
  ansible.builtin.debug:
    msg: "Kubeconfig saved to kubeconfig-{{ inventory_hostname }}.yaml — use with: export KUBECONFIG=$(pwd)/kubeconfig-{{ inventory_hostname }}.yaml"
