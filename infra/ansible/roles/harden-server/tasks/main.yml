---
# Role: harden-server
# Applies basic server hardening:
#   - UFW firewall (allow SSH, k3s API, Jenkins, Grafana; deny all else)
#   - fail2ban for SSH brute-force protection
#   - Disable root SSH login
#   - Disable password authentication (key-only SSH)

- name: Install UFW and fail2ban
  ansible.builtin.dnf:
    name:
      - ufw
      - fail2ban
    state: present

# ---------------------------------------------------------------------------
# UFW firewall
# ---------------------------------------------------------------------------
- name: Reset UFW to defaults
  community.general.ufw:
    state: reset

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH (port 22)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: SSH

- name: Allow k3s API (port 6443)
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
    comment: k3s API

- name: Allow Jenkins (port 8081)
  community.general.ufw:
    rule: allow
    port: "8081"
    proto: tcp
    comment: Jenkins

- name: Allow Grafana (port 3000)
  community.general.ufw:
    rule: allow
    port: "3000"
    proto: tcp
    comment: Grafana

- name: Enable UFW
  community.general.ufw:
    state: enabled

# ---------------------------------------------------------------------------
# fail2ban
# ---------------------------------------------------------------------------
- name: Write fail2ban jail.local
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [DEFAULT]
      bantime  = 1h
      findtime = 10m
      maxretry = 5
      backend  = systemd

      [sshd]
      enabled  = true
      port     = ssh
      logpath  = %(sshd_log)s

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: restarted

# ---------------------------------------------------------------------------
# SSH hardening
# ---------------------------------------------------------------------------
- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
    backup: true

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present

- name: Disable empty passwords
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitEmptyPasswords'
    line: 'PermitEmptyPasswords no'
    state: present

- name: Reload sshd to apply changes
  ansible.builtin.systemd:
    name: sshd
    state: reloaded
