---
# Role: bootstrap-server
# Installs base dependencies: Docker, Python3, pip, curl, unzip

- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true

- name: Install base packages
  ansible.builtin.dnf:
    name:
      - curl
      - unzip
      - git
      - python3
      - python3-pip
      - python3-devel
      - gcc
    state: present

- name: Install Docker
  ansible.builtin.dnf:
    name: docker
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add ec2-user to docker group
  ansible.builtin.user:
    name: ec2-user
    groups: docker
    append: true

- name: Install Python packages for scanner
  ansible.builtin.pip:
    name:
      - boto3
      - botocore
      - psycopg2-binary
      - requests
      - prometheus-client
    state: present
    executable: pip3

- name: Reset ssh connection to pick up docker group
  ansible.builtin.meta: reset_connection
